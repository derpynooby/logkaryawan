# ============================================================
# nginx.conf — Log Karyawan (Laragon)
# Letakkan path ini di Laragon > Menu > Nginx > sites/logkaryawan.conf
# atau edit manual: C:\laragon\etc\nginx\sites-enabled\logkaryawan.conf
# ============================================================

# FIX: Rate limiting zone — max 10 req/menit per IP untuk endpoint login
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;

server {
    listen 80;
    server_name localhost;

    # Root ke folder app (sesuaikan path jika berbeda)
    root "C:/laragon/www/logkaryawan/app";
    index index.php;

    charset utf-8;

    # ── FIX: HTTP Security Headers ──────────────────────────────────
    add_header X-Frame-Options           "DENY"                              always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header Referrer-Policy           "no-referrer-when-downgrade"        always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:; object-src 'none'; frame-ancestors 'none';" always;
    # Aktifkan HSTS hanya jika sudah pakai HTTPS:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Custom error pages ──────────────────────────────────────────
    error_page 400              /error.php?code=400;
    error_page 401              /error.php?code=401;
    error_page 403              /error.php?code=403;
    error_page 404              /error.php?code=404;
    error_page 405              /error.php?code=405;
    error_page 500 502 503 504  /error.php?code=500;

    location = /error.php {
        internal;
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  QUERY_STRING     $query_string;
    }

    # ── FIX: Rate limiting pada endpoint login ───────────────────────
    location = /index.php {
        limit_req zone=login_zone burst=5 nodelay;
        limit_req_status 429;
        error_page 429 /error.php?code=429;

        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  QUERY_STRING     $query_string;
    }

    # ── PHP handler ──────────────────────────────────────────────────
    location ~ \.php$ {
        try_files      $uri =404;
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  QUERY_STRING     $query_string;
    }

    # ── Static assets ─────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires    30d;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── FIX: Blok akses ke file dan direktori sensitif ───────────────
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }
    location ~ \.(sql|md|zip|log)$ {
        deny all;
        return 404;
    }
    # Blok akses langsung ke folder database/
    location ^~ /database/ {
        deny all;
        return 404;
    }

    # ── Fallback ──────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
