# ============================================================
# nginx.conf — Log Karyawan (Laragon)
# Letakkan path ini di Laragon > Menu > Nginx > sites/logkaryawan.conf
# atau edit manual: C:\laragon\etc\nginx\sites-enabled\logkaryawan.conf
# ============================================================

server {
    listen 80;
    server_name localhost;

    # Root ke folder app (sesuaikan path jika berbeda)
    root "C:/laragon/www/logkaryawan/app";
    index index.php;

    charset utf-8;

    # ── Custom error pages (arahkan ke error.php kita) ──────────────
    error_page 400              /error.php?code=400;
    error_page 401              /error.php?code=401;
    error_page 403              /error.php?code=403;
    error_page 404              /error.php?code=404;
    error_page 405              /error.php?code=405;
    error_page 500 502 503 504  /error.php?code=500;

    # Blok untuk menangani error_page redirect internal
    location = /error.php {
        internal;           # hanya bisa diakses via redirect internal Nginx
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  QUERY_STRING     $query_string;
    }

    # ── PHP handler ──────────────────────────────────────────────────
    location ~ \.php$ {
        try_files      $uri =404;
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  QUERY_STRING     $query_string;
    }

    # ── Static assets ────────────────────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires    30d;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── Blok akses ke file sensitif ──────────────────────────────────
    location ~ /\.(git|env|htaccess) {
        deny all;
        return 404;
    }
    location ~ \.(sql|md|zip|log)$ {
        deny all;
        return 404;
    }

    # ── Fallback: semua URL → cek file → cek dir → index.php ────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}
